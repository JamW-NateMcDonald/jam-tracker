<!DOCTYPE html>
<html>
<head>
  <title>Jam Tracker</title>

  <!-- 🎸 Google Font -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Righteous', sans-serif;
      background: radial-gradient(circle at center,
        #5a1a1a 0%,
        #2e1717 40%,
        #120909 100%
      );
      color: white;
      padding: 20px;
    }

    /* ✨ smooth UI transitions */
    * {
      transition: all 0.4s ease;
    }

    h1 {
      text-align: center;
    }

    input, select {
      padding: 6px;
      margin: 5px;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    button {
      padding: 8px;
      margin: 5px;
      cursor: pointer;
      border-radius: 5px;
      border: none;
      background: #3a1b1b;
      color: white;
    }

    button:hover {
      background: #5a1a1a;
      transform: scale(1.03);
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #333;
      text-align: center;
    }

    th {
      cursor: pointer;
    }

    a {
      color: #38bdf8;
    }
a {
  color: red;
  text-decoration: none;
}

a:hover {
  color: darkred;
  text-decoration: underline;
}  
  </style>
</head>

<body>

<h1>Jam Tracker</h1>

<div>
  <input id="song" placeholder="Song Name">
  <input id="band" placeholder="Band Name">
  <input id="album" placeholder="Album">

<input id="tuning" placeholder="Tuning">  
  <input id="songsterr" placeholder="Songsterr Link">
  <input id="spotify" placeholder="Spotify Link">

 <div>
  <label>Difficulty</label>
  <select id="difficulty">
    <option value="" disabled selected>Select difficulty</option>
    <option value="Easy">Easy</option>
    <option value="Medium">Medium</option>
    <option value="Hard">Hard</option>
  </select>
</div>

<div>
  <label>Progress</label>
  <select id="status">
    <option value="" disabled selected>Select progress</option>
    <option value="Want to Learn">Want to Learn</option>
    <option value="Learning">Learning</option>
    <option value="Learned">Learned</option>
  </select>
</div>

  <button onclick="addSong()">Add Song</button>
</div>

<button onclick="sortByBand()">Sort by Band (A–Z)</button>
  
<button onclick="sortByTuning()">Sort by Tuning</button>
<table>
  <thead>
    <tr>
      <th>Song</th>
      <th>Band</th>
      <th>Album</th>
      <th>Tuning</th>
      <th>Tabs</th>
      <th>Spotify</th>
      <th>Difficulty</th>
      <th>Status</th>
       <th>Actions</th> <!-- add this -->
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
let songs = JSON.parse(localStorage.getItem("songs")) || [];
let editIndex = null;

// run on load
renderTable();

function saveSongs() {
  localStorage.setItem("songs", JSON.stringify(songs));
}

function addSong() {
  const songInput = document.getElementById("song").value.trim();
  const bandInput = document.getElementById("band").value.trim();

  if (!songInput || !bandInput) {
    alert("Please enter at least a song name and band");
    return;
  }

  const song = {
    name: songInput,
    band: bandInput,
    album: document.getElementById("album").value.trim(),
    tuning: document.getElementById("tuning").value.trim(),
    songsterr: document.getElementById("songsterr").value.trim(),
    spotify: document.getElementById("spotify").value.trim(),
    difficulty: document.getElementById("difficulty").value,
    status: document.getElementById("status").value
  };

  if (editIndex !== null) {
    songs[editIndex] = song;
    editIndex = null;
  } else {
    songs.push(song);
  }

  saveSongs();
  renderTable();
  resetForm();
}

function resetForm() {
  document.getElementById("song").value = "";
  document.getElementById("band").value = "";
  document.getElementById("album").value = "";
  document.getElementById("tuning").value = "";
  document.getElementById("songsterr").value = "";
  document.getElementById("spotify").value = "";
  document.getElementById("difficulty").selectedIndex = 0;
  document.getElementById("status").selectedIndex = 0;
}

function renderTable() {
  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  songs.forEach((s, index) => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${s.name}</td>
      <td>${s.band}</td>
      <td>${s.album || ""}</td>
      <td>${s.tuning || ""}</td>
      <td>${s.songsterr ? `<a href="${s.songsterr}" target="_blank">Tabs</a>` : ""}</td>
      <td>${s.spotify ? `<a href="${s.spotify}" target="_blank">Listen</a>` : ""}</td>
      <td>${s.difficulty || ""}</td>
      <td>${s.status || ""}</td>
      <td>
        <button onclick="startEdit(${index})">Edit</button>
        <button onclick="deleteSong(${index})">❌</button>
      </td>
    `;

    table.appendChild(row);
  });
}

function deleteSong(index) {
  songs.splice(index, 1);
  saveSongs();
  renderTable();
}

function sortByBand() {
  songs.sort((a, b) => {
    const bandCompare = a.band.localeCompare(b.band);
    if (bandCompare !== 0) return bandCompare;
    return a.name.localeCompare(b.name);
  });

  saveSongs();
  renderTable();
}

function sortByTuning() {
  songs.sort((a, b) => (a.tuning || "").localeCompare(b.tuning || ""));
  saveSongs();
  renderTable();
}

// 🔥 MUCH BETTER edit system (fills form instead of prompt)
function startEdit(index) {
  const s = songs[index];

  document.getElementById("song").value = s.name;
  document.getElementById("band").value = s.band;
  document.getElementById("album").value = s.album;
  document.getElementById("tuning").value = s.tuning;
  document.getElementById("songsterr").value = s.songsterr;
  document.getElementById("spotify").value = s.spotify;
  document.getElementById("difficulty").value = s.difficulty;
  document.getElementById("status").value = s.status;

  editIndex = index;
}
</script>

</body>
</html>
