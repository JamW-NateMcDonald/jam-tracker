<!DOCTYPE html>
<html>
<head>
  <title>index.html</title>
  <style>
    body {
      font-family: Sans-serif;
      background: #2e1717;
      color: white;
      padding: 20px;
    }
    h1 { text-align: center; }

    input, select {
      padding: 6px;
      margin: 5px;
    }

    button {
      padding: 8px;
      margin: 5px;
      cursor: pointer;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #333;
      text-align: center;
    }

    th { cursor: pointer; }

    a { color: #38bdf8; }
  </style>
</head>

<body>

<h1>Jam Tracker</h1>

<div>
  <input id="song" placeholder="Song Name">
  <input id="band" placeholder="Band Name">
  <input id="album" placeholder="Album">

<input id="tuning" placeholder="Tuning">  
  <input id="songsterr" placeholder="Songsterr Link">
  <input id="spotify" placeholder="Spotify Link">

  <select id="difficulty">
    <option>Easy</option>
    <option>Medium</option>
    <option>Hard</option>
  </select>

  <select id="status">
    <option>Want to Learn</option>
    <option>Learning</option>
    <option>Learned</option>
  </select>

  <button onclick="addSong()">Add Song</button>
</div>

<button onclick="sortByTuning()">Sort by Tuning</button>

<table>
  <thead>
    <tr>
      <th>Song</th>
      <th>Band</th>
      <th>Album</th>
      <th>Tuning</th>
      <th>Tabs</th>
      <th>Spotify</th>
      <th>Difficulty</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  onSnapshot,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔑 PASTE YOUR CONFIG HERE
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
	<key>API_KEY</key>
	<string>AIzaSyC5WZtXrVG6MVxvmMlLUIcp4-WYQSYn1kk</string>
	<key>GCM_SENDER_ID</key>
	<string>315882525739</string>
	<key>PLIST_VERSION</key>
	<string>1</string>
	<key>BUNDLE_ID</key>
	<string>1.0</string>
	<key>PROJECT_ID</key>
	<string>jam-tracker-1</string>
	<key>STORAGE_BUCKET</key>
	<string>jam-tracker-1.firebasestorage.app</string>
	<key>IS_ADS_ENABLED</key>
	<false></false>
	<key>IS_ANALYTICS_ENABLED</key>
	<false></false>
	<key>IS_APPINVITE_ENABLED</key>
	<true></true>
	<key>IS_GCM_ENABLED</key>
	<true></true>
	<key>IS_SIGNIN_ENABLED</key>
	<true></true>
	<key>GOOGLE_APP_ID</key>
	<string>1:315882525739:ios:4e40e5c74af432f645c66e</string>
</dict>
</plist>
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const songsRef = collection(db, "songs");

// 🔴 REAL-TIME LISTENER (THIS IS THE MAGIC)
onSnapshot(query(songsRef, orderBy("tuning")), (snapshot) => {
  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  snapshot.forEach((docSnap) => {
    const s = docSnap.data();
    const id = docSnap.id;

    table.innerHTML += `
      <tr>
        <td>${s.name}</td>
        <td>${s.band}</td>
        <td>${s.album}</td>
        <td>${s.tuning}</td>
        <td><a href="${s.songsterr}" target="_blank">Tabs</a></td>
        <td><a href="${s.spotify}" target="_blank">Listen</a></td>
        <td>${s.difficulty}</td>
        <td>${s.status}</td>
        <td>
          <button onclick="deleteSong('${id}')"
            style="background:red;color:white;border:none;padding:5px 8px;border-radius:5px;cursor:pointer;">
            ❌
          </button>
        </td>
      </tr>
    `;
  });
});

// ➕ ADD SONG
window.addSong = async function () {
  await addDoc(songsRef, {
    name: document.getElementById("song").value,
    band: document.getElementById("band").value,
    album: document.getElementById("album").value,
    tuning: document.getElementById("tuning").value,
    songsterr: document.getElementById("songsterr").value,
    spotify: document.getElementById("spotify").value,
    difficulty: document.getElementById("difficulty").value,
    status: document.getElementById("status").value
  });

  // clear inputs
  document.getElementById("song").value = "";
  document.getElementById("band").value = "";
  document.getElementById("album").value = "";
  document.getElementById("tuning").value = "";
  document.getElementById("songsterr").value = "";
  document.getElementById("spotify").value = "";
};

// ❌ DELETE SONG
window.deleteSong = async function (id) {
  await deleteDoc(doc(db, "songs", id));
};

// sorting handled by Firebase now
window.sortByTuning = function () {
  alert("Already auto-sorted by tuning 🔥");
};
</script>

</body>
</html>
