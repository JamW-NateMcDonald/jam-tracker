    /* Difficulty colors */
 .difficulty-easy { color: #22c55e; font-weight: bold; }
.difficulty-medium { color: #facc15; font-weight: bold; }
.difficulty-hard { color: #ef4444; font-weight: bold; }

.controls,
.filters {
  background: rgba(0,0,0,0.25);
  padding: 18px;
  border-radius: 16px;
  margin-bottom: 20px;
  border: 1px solid rgba(255,255,255,0.06);
}

.controls {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
}

.filters {
  display: flex;
  flex-wrap: wrap;

  justify-content: center;
}

.version {
  position: fixed;
  bottom: 10px;
  left: 10px;
  font-size: 12px;
  opacity: 0.6;
}

@keyframes formPulse {
  0% {
    box-shadow: 0 0 0px rgba(255, 0, 0, 0);
    transform: scale(1);
  }
  25% {
    box-shadow: 0 0 30px rgba(255, 0, 0, 0.9);
    transform: scale(1.01);
  }
  50% {
    box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
  }
  100% {
    box-shadow: 0 0 0px rgba(255, 0, 0, 0);
    transform: scale(1);
  }
}

.highlight-add {
  animation: formPulse 0.8s ease-in-out;
  border-radius: 10px;
}

#songForm {
  transition: all 0.2s ease;

</head>
<body>

<h1>Jam Tracker</h1>
  
<div id="stats">
  <p id="totalCount"></p> <p id="learningCount"></p> <p id="learnedCount"></p>
</div>

<div id="addContainer">
  
<div class="controls">
  <input id="song" placeholder="Song Name">
  <input id="band" placeholder="Band Name">
  <input id="album" placeholder="Album">
  <input id="tuning" placeholder="Tuning">
  <input id="songsterr" placeholder="Songsterr Link">
  <input id="spotify" placeholder="Spotify Link">
  
  <div>
    <label>Difficulty</label>
    <select id="difficulty">
      <option value="" disabled selected>Select difficulty</option>
      <option value="Easy">Easy</option>
      <option value="Medium">Medium</option>
      <option value="Hard">Hard</option>
    </select>
  </div>

<div class="version">v1.111</div>
  
<div>
  <label>Status</label>
  <select id="statusInput">
    <option value="" disabled selected>Select status</option>
    <option value="Want to Learn">Want to Learn</option>
    <option value="Learning">Learning</option>
    <option value="Learned">Learned</option>
  </select>
</div>

  <button onclick="addSong()">Add Song</button>
</div>

<br>

<div class="filters">
  <input id="search" placeholder="Search songs or bands..." oninput="renderTable()">

<select id="difficultyFilter" onchange="renderTable()">
<option value="all">All Levels</option>
  <option value="Easy">Easy</option>
  <option value="Medium">Medium</option>
  <option value="Hard">Hard</option>
</select>

<select id="statusFilter" onchange="renderTable()">
  <option value="all">All Statuses</option>
  <option value="Want to Learn">Want to Learn</option>
  <option value="Learning">Learning</option>
  <option value="Learned">Learned</option>
</select>
  <button onclick="sortByBand()">Sort by Band (A–Z)</button>
  <button onclick="sortByTuning()">Sort by Tuning</button>
</div>
  
<div class="table-container">
  <table>
  <thead>
    <tr>
      <th>Band</th>
      <th>Song</th>
      <th>Album</th>
      <th>Tuning</th>
      <th>Tabs</th>
      <th>Spotify</th>
      <th>Difficulty</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
  </table>
</div>

<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

</script>
  
<script>
async function loadSongs() {
  const querySnapshot = await getDocs(collection(db, "songs"));
  songs = [];

  querySnapshot.forEach((docSnap) => {
    songs.push({ id: docSnap.id, ...docSnap.data() });
  });

  renderTable();
}

let songs = [];

try {
  songs = JSON.parse(localStorage.getItem("songs")) || [];
} catch (e) {
  songs = [];
}let editIndex = null;

renderTable();

function saveSongs() {
  try {
    localStorage.setItem("songs", JSON.stringify(songs));
    console.log("saved", songs);
  } catch (e) {
    console.error("Save failed:", e);
  }
}

function addSong() {
  console.log("add clicked");

  const songEl = document.getElementById("song");
  const bandEl = document.getElementById("band");

  if (!songEl || !bandEl) {
    console.error("Missing input fields");
    return;
  }

  const songInput = songEl.value.trim();
  const bandInput = bandEl.value.trim();

  if (!songInput || !bandInput) {
    alert("Please enter song name and band");
    return;
  }

  const song = {
    name: songInput,
    band: bandInput,
    album: document.getElementById("album").value.trim(),
    tuning: document.getElementById("tuning").value.trim(),
    songsterr: document.getElementById("songsterr").value.trim(),
    spotify: document.getElementById("spotify").value.trim(),
    difficulty: document.getElementById("difficulty").value || "",
    status: document.getElementById("statusInput").value || ""
  };

  if (editIndex !== null) {
    songs[editIndex] = song;
    editIndex = null;
  } else {
    songs.push(song);
  }

  console.log("songs array now:", songs);

  saveSongs();
  renderTable();
  resetForm();
}

function resetForm() {
  document.getElementById("song").value = "";
  document.getElementById("band").value = "";
  document.getElementById("album").value = "";
  document.getElementById("tuning").value = "";
  document.getElementById("songsterr").value = "";
  document.getElementById("spotify").value = "";
  document.getElementById("difficulty").selectedIndex = 0;
  document.getElementById("statusInput").selectedIndex = 0;
}

function renderTable() {
  const table = document.getElementById("tableBody");
  table.innerHTML = "";
  
  const search = document.getElementById("search").value.toLowerCase();
  const difficultyFilter = document.getElementById("difficultyFilter").value;
  const statusFilter = document.getElementById("statusFilter")?.value || "all";

if (!Array.isArray(songs) || songs.length === 0) {
  table.innerHTML = `
    <tr>
      <td colspan="9" style="text-align:center; opacity:0.6;">
        No songs yet 🎸
      </td>
    </tr>
  `;
  return;
}
  
  songs.forEach((s, realIndex) => {
    const matchesSearch =
      s.name.toLowerCase().includes(search) ||
      s.band.toLowerCase().includes(search);

  const matchesDifficulty =
  difficultyFilter === "all" || s.difficulty === difficultyFilter;

const matchesStatus =
  statusFilter === "all" || s.status === statusFilter;

if (!matchesSearch || !matchesDifficulty || !matchesStatus) return;

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${s.band}</td>
      <td>${s.name}</td>
      <td>${s.album || ""}</td>
      <td>${s.tuning || ""}</td>
      <td>${s.songsterr ? `<a href="${s.songsterr}" target="_blank">Tabs</a>` : ""}</td>
      <td>${s.spotify ? `<a href="${s.spotify}" target="_blank">Listen</a>` : ""}</td>
      <td class="difficulty-${(s.difficulty || "").toLowerCase()}">${s.difficulty || ""}</td>
      <td>${s.status || ""}</td>
      <td>
        <button onclick="startEdit(${realIndex})">Edit</button>
        <button onclick="deleteSong(${realIndex})">❌</button>
      </td>
    `;

    table.appendChild(row);
  });
  updateStats();
}
document.getElementById("difficultyFilter").addEventListener("change", renderTable);
document.getElementById("statusFilter").addEventListener("change", renderTable);
function deleteSong(index) {
  songs.splice(index, 1);
  saveSongs();
  renderTable();
  updateStats();
}

function sortByBand() {
  songs.sort((a, b) => {
    const bandCompare = a.band.localeCompare(b.band);
    return bandCompare !== 0 ? bandCompare : a.name.localeCompare(b.name);
  });

  saveSongs();
  renderTable();
}

function sortByTuning() {
  songs.sort((a, b) => (a.tuning || "").localeCompare(b.tuning || ""));
  saveSongs();
  renderTable();
}

function startEdit(index) {
  const s = songs[index];

  document.getElementById("song").value = s.name;
  document.getElementById("band").value = s.band;
  document.getElementById("album").value = s.album;
  document.getElementById("tuning").value = s.tuning;
  document.getElementById("songsterr").value = s.songsterr;
  document.getElementById("spotify").value = s.spotify;
  document.getElementById("difficulty").value = s.difficulty;
  document.getElementById("statusInput").value = s.status;

  editIndex = index;

  const addContainer = document.getElementById("addContainer");

  // scroll into view
  addContainer.scrollIntoView({ behavior: "smooth" });

  // trigger glow animation
  addContainer.classList.add("highlight-add");

  setTimeout(() => {
    document.getElementById("song").focus();
  }, 300);

  // remove class so it can re-trigger next time
  setTimeout(() => {
    addContainer.classList.remove("highlight-form");
  }, 1000);
}

function updateStats() {
  const total = songs.length;
  const learning = songs.filter(s => s.status === "Learning").length;
  const learned = songs.filter(s => s.status === "Learned").length;

  document.getElementById("totalCount").innerText = `Total Songs: ${total}`;
  document.getElementById("learningCount").innerText = `Learning: ${learning}`;
  document.getElementById("learnedCount").innerText = `Learned: ${learned}`;
}
</script>

</body>
</html>
