<!DOCTYPE html>
<html>
<head>
  <title>Jam Tracker</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">

  <style>
@font-face {
  font-family: "GojiraBlack";
  src: url("GojiraBlack.ttf");
}
    body {
      font-family: 'Righteous', sans-serif;
      background: radial-gradient(circle at center,
        #5a1a1a 0%,
        #2e1717 40%,
        #120909 100%
      );
      color: white;
      padding: 10px;
    }

    * {
      transition: all 0.3s ease;
    }

    h1 {
  font-family: "GojiraBlack", sans-serif;
  font-size: 56px;
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
  margin: 30px 0;

  color: #ffffff;

  text-shadow:
    0 0 8px rgba(139, 0, 0, 0.6),
    0 0 20px rgba(139, 0, 0, 0.5),
    0 0 40px rgba(139, 0, 0, 0.2);
}
  
    input, select {
      padding: 6px;
      margin: 5px;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    button {
      padding: 8px;
      margin: 5px;
      cursor: pointer;
      border-radius: 5px;
      border: none;
      background: #3a1b1b;
      color: white;
    }

    button:hover {
      background: #5a1a1a;
      transform: scale(1.03);
    }
<select id="difficultyFilter" onchange="renderTable()">
  <option value="all">All Levels</option>
  <option value="Beginner">Beginner</option>
  <option value="Intermediate">Intermediate</option>
  <option value="Advanced">Advanced</option>
</select>
    
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #333;
      text-align: center;
    }

    a {
      color: red;
      text-decoration: none;
    }

    a:hover {
      color: darkred;
      text-decoration: underline;
    }

    /* 🎯 Difficulty colors */
    .difficulty-easy {
      color: #22c55e;
      font-weight: bold;
    }

    .difficulty-medium {
      color: #facc15;
      font-weight: bold;
    }

    .difficulty-hard {
      color: #ef4444;
      font-weight: bold;
    }
    
  </style>
</head>
</html>

<body>

<h1>Jam Tracker</h1>
<div>
  <input id="song" placeholder="Song Name">
  <input id="band" placeholder="Band Name">
  <input id="album" placeholder="Album">
  <input id="tuning" placeholder="Tuning">
  <input id="songsterr" placeholder="Songsterr Link">
  <input id="spotify" placeholder="Spotify Link">

  <div>
    <label>Difficulty</label>
    <select id="difficulty">
      <option value="" disabled selected>Select difficulty</option>
      <option value="Easy">Easy</option>
      <option value="Medium">Medium</option>
      <option value="Hard">Hard</option>
    </select>
  </div>

  <div>
    <label>Progress</label>
    <select id="status">
      <option value="" disabled selected>Select progress</option>
      <option value="Want to Learn">Want to Learn</option>
      <option value="Learning">Learning</option>
      <option value="Learned">Learned</option>
    </select>
  </div>

  <button onclick="addSong()">Add Song</button>
</div>

<br>

<div>
  <input id="search" placeholder="Search songs or bands..." oninput="renderTable()">

  <select id="difficultyFilter" onchange="filterSongs()">
  <option value="all">All Levels</option>
  <option value="beginner">Beginner</option>
  <option value="intermediate">Intermediate</option>
  <option value="advanced">Advanced</option>
</select>

  <button onclick="sortByBand()">Sort by Band (A–Z)</button>
  <button onclick="sortByTuning()">Sort by Tuning</button>
</div>

<table>
  <thead>
    <tr>
      <th>Song</th>
      <th>Band</th>
      <th>Album</th>
      <th>Tuning</th>
      <th>Tabs</th>
      <th>Spotify</th>
      <th>Difficulty</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
let songs = JSON.parse(localStorage.getItem("songs")) || [];
let editIndex = null;

renderTable();

function saveSongs() {
  try {
    localStorage.setItem("songs", JSON.stringify(songs));
    console.log("saved", songs);
  } catch (e) {
    console.error("Save failed:", e);
  }
}

function addSong() {
  console.log("add clicked");

  const songEl = document.getElementById("song");
  const bandEl = document.getElementById("band");

  if (!songEl || !bandEl) {
    console.error("Missing input fields");
    return;
  }

  const songInput = songEl.value.trim();
  const bandInput = bandEl.value.trim();

  if (!songInput || !bandInput) {
    alert("Please enter song name and band");
    return;
  }

  const song = {
    name: songInput,
    band: bandInput,
    album: document.getElementById("album").value.trim(),
    tuning: document.getElementById("tuning").value.trim(),
    songsterr: document.getElementById("songsterr").value.trim(),
    spotify: document.getElementById("spotify").value.trim(),
    difficulty: document.getElementById("difficulty").value || "",
    status: document.getElementById("status").value || ""
  };

  if (editIndex !== null) {
    songs[editIndex] = song;
    editIndex = null;
  } else {
    songs.push(song);
  }

  console.log("songs array now:", songs);

  saveSongs();
  renderTable();
  resetForm();
}

function resetForm() {
  document.getElementById("song").value = "";
  document.getElementById("band").value = "";
  document.getElementById("album").value = "";
  document.getElementById("tuning").value = "";
  document.getElementById("songsterr").value = "";
  document.getElementById("spotify").value = "";
  document.getElementById("difficulty").selectedIndex = 0;
  document.getElementById("status").selectedIndex = 0;
}

function renderTable() {
  const table = document.getElementById("tableBody");
  table.innerHTML = "";

  const search = document.getElementById("search").value.toLowerCase();
const difficultyFilter = document.getElementById("difficultyFilter").value;
  
  songs.forEach((s, realIndex) => {
    const matchesSearch =
      s.name.toLowerCase().includes(search) ||
      s.band.toLowerCase().includes(search);

   const matchesDifficulty =
  difficultyFilter === "all" || s.difficulty === difficultyFilter;

if (!matchesSearch || !matchesDifficulty) return;

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${s.name}</td>
      <td>${s.band}</td>
      <td>${s.album || ""}</td>
      <td>${s.tuning || ""}</td>
      <td>${s.songsterr ? `<a href="${s.songsterr}" target="_blank">Tabs</a>` : ""}</td>
      <td>${s.spotify ? `<a href="${s.spotify}" target="_blank">Listen</a>` : ""}</td>
      <td class="difficulty-${(s.difficulty || "").toLowerCase()}">${s.difficulty || ""}</td>
      <td>${s.status || ""}</td>
      <td>
        <button onclick="startEdit(${realIndex})">Edit</button>
        <button onclick="deleteSong(${realIndex})">❌</button>
      </td>
    `;

    table.appendChild(row);
  });
}

function deleteSong(index) {
  songs.splice(index, 1);
  saveSongs();
  renderTable();
}

function sortByBand() {
  songs.sort((a, b) => {
    const bandCompare = a.band.localeCompare(b.band);
    return bandCompare !== 0 ? bandCompare : a.name.localeCompare(b.name);
  });

  saveSongs();
  renderTable();
}

function sortByTuning() {
  songs.sort((a, b) => (a.tuning || "").localeCompare(b.tuning || ""));
  saveSongs();
  renderTable();
}

function startEdit(index) {
  const s = songs[index];

  document.getElementById("song").value = s.name;
  document.getElementById("band").value = s.band;
  document.getElementById("album").value = s.album;
  document.getElementById("tuning").value = s.tuning;
  document.getElementById("songsterr").value = s.songsterr;
  document.getElementById("spotify").value = s.spotify;
  document.getElementById("difficulty").value = s.difficulty;
  document.getElementById("status").value = s.status;

  editIndex = index;
}
</script>

</body>
</html>
